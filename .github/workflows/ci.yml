name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium webkit
      - name: Build and Export
        run: |
          export NEXT_PUBLIC_BASE_PATH=/sldeleb2
          export NEXT_PUBLIC_SITE_URL=https://ywkinfo.github.io
          npm run build:pages
      - name: Run E2E tests
        run: |
          export NEXT_PUBLIC_BASE_PATH=/sldeleb2
          export PLAYWRIGHT_BASE_URL=http://127.0.0.1:3005
          npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
